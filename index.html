<!DOCTYPE html>

  <title>CineRate</title>

      <h1 class="logo">CineRate</h1>
      <p class="tagline">Top picks of the season</p>
    </header>

      <div class="card" id="card-1">
        <div class="poster poster-1">
          <span class="genre-tag" id="genre-1"></span>
          <span class="year-badge" id="year-1"></span>
        </div>
        <div class="card-body">
          <h3 class="title" id="title-1">Loading...</h3>
          <div class="rating-row">
            <span class="star">&#9733;</span>
            <span class="score" id="score-1">&mdash;</span>
            <span class="votes" id="votes-1"></span>
          </div>
          <div class="bar-track">
            <div class="bar" id="bar-1"></div>
          </div>
          <p class="description" id="desc-1"></p>
        </div>
      </div>
